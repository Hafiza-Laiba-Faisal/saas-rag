version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  rag-node:
    build: .
    ports:
      - "3001:3001"
    depends_on:
      - qdrant
    env_file:
      - .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    volumes:
      - ./tenants:/app/tenants
      - ./static:/app/static
      - ./prisma:/app/prisma
      - rag_data:/app/.rbs_rag
    restart: unless-stopped

volumes:
  qdrant_data:
  rag_data:
