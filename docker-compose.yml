networks:
  rag_network:
    driver: bridge

volumes:
  rag_data:
  qdrant_data:
  redis_data:
  ocr_data:
  scraper_data:

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: tenbit-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - rag_network
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_ENABLED: "true"
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: tenbit-redis
    restart: unless-stopped
    networks:
      - rag_network
    volumes:
      - redis_data:/data
    command: >
      sh -c '
        if [ -n "$REDIS_PASSWORD" ]; then
          redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}"
        else
          redis-server --appendonly yes
        fi
      '
    environment:
      REDIS_PASSWORD: ${RAG_REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  rag_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tenbit-rag-api
    restart: unless-stopped
    networks:
      - rag_network
    volumes:
      - rag_data:/data
    env_file:
      - .env
    environment:
      - RAG_ROOT_DIR=/data/.rbs_rag
      - QDRANT_HOST=${RAG_QDRANT_HOST:-qdrant}
      - QDRANT_PORT=${RAG_QDRANT_PORT:-6333}
      - RAG_ENCRYPTION_KEY=${RAG_ENCRYPTION_KEY:-}
      - RAG_ADMIN_JWT_SECRET=${RAG_ADMIN_JWT_SECRET:-}
      - RAG_ADMIN_PASSWORD=${RAG_ADMIN_PASSWORD:-admin}
      - RAG_TERMINAL_ENABLED=${RAG_TERMINAL_ENABLED:-true}
      - UVICORN_WORKERS=${UVICORN_WORKERS:-4}
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy

  ocr_service:
    build:
      context: ./ocr-service-main
      dockerfile: Dockerfile
    container_name: tenbit-ocr
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - rag_network
    volumes:
      - ocr_data:/app/uploads
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  scraper_service:
    build:
      context: ./scraper-service
      dockerfile: Dockerfile
    container_name: tenbit-scraper
    restart: unless-stopped
    networks:
      - rag_network
    ports:
      - "8002:8000"
    volumes:
      - scraper_data:/app/data
      - scraper_data:/app/downloads
    env_file:
      - .env
    environment:
      - DEEPCRAWL_API_KEY=${DEEPCRAWL_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: tenbit-nginx
    restart: unless-stopped
    networks:
      - rag_network
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - rag_api
      - ocr_service
      - scraper_service
